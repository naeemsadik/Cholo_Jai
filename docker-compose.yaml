# Cholo Jai — root-level Compose for Coolify / VPS deployment.
#
# This file lives at the repository root and pulls in the Laravel app
# from the `backend-laravel/` subdirectory. Deploy from the repo root
# with `docker compose up -d` (or point Coolify's Docker Compose resource
# at the repo root).
#
# Services:
#   - db          MySQL 8.0 with utf8mb4 + Asia/Dhaka timezone
#   - backend     Laravel 11 php-fpm app (built from backend-laravel/)
#   - web         nginx:alpine serving PHP-FPM on :8000
#   - phpmyadmin  DB admin UI on 127.0.0.1:8080 (tunnel in via SSH)
#
# Fill in the secrets in `.env` next to this file (copy from
# backend-laravel/.env.coolify.example) before `docker compose up -d`.
# Coolify will also let you set these as Service → Environment
# Variables in its UI instead of mounting a .env file.

name: cholo-jai-backend

services:
  db:
    image: mysql:8.0
    container_name: cholo-jai-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+06:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-laravel/docker/mysql.cnf:/etc/mysql/conf.d/cholo.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env or Coolify secrets}'
      MYSQL_DATABASE: '${MYSQL_DATABASE:-cholo_jai}'
      MYSQL_USER: '${MYSQL_USER:-cholo}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env or Coolify secrets}'
    healthcheck:
      test:
        - CMD
        - mysqladmin
        - ping
        - '-h'
        - 127.0.0.1
        - '-u'
        - root
        - '-p${MYSQL_ROOT_PASSWORD}'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  backend:
    build:
      context: ./backend-laravel
      dockerfile: docker/Dockerfile
    image: cholo-jai-backend:latest
    container_name: cholo-jai-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Laravel core ──
      APP_NAME: 'CholoJai'
      APP_ENV: '${APP_ENV:-production}'
      APP_KEY: '${APP_KEY:?generate with: docker compose run --rm backend php artisan key:generate --show}'
      APP_DEBUG: '${APP_DEBUG:-false}'
      APP_URL: '${APP_URL:-http://localhost:8000}'
      LOG_CHANNEL: 'stack'
      LOG_LEVEL: '${LOG_LEVEL:-info}'
      API_VERSION: '${API_VERSION:-0.1.0}'

      # ── Database (MySQL) ──
      DB_CONNECTION: 'mysql'
      DB_HOST: 'db'
      DB_PORT: '3306'
      DB_DATABASE: '${MYSQL_DATABASE:-cholo_jai}'
      DB_USERNAME: '${MYSQL_USER:-cholo}'
      DB_PASSWORD: '${MYSQL_PASSWORD:?set MYSQL_PASSWORD in .env or Coolify secrets}'
      DB_CHARSET: 'utf8mb4'
      DB_COLLATION: 'utf8mb4_unicode_ci'

      # ── Cache / sessions / queue (file-backed; no Redis needed) ──
      CACHE_STORE: 'file'
      SESSION_DRIVER: 'file'
      SESSION_LIFETIME: '120'
      QUEUE_CONNECTION: 'sync'
      FILESYSTEM_DISK: 'public'

      # ── CORS / frontend origin ──
      FRONTEND_ORIGIN: '${FRONTEND_ORIGIN:-http://localhost:3000}'
      FRONTEND_URL: '${FRONTEND_URL:-http://localhost:3000}'
      SANCTUM_STATEFUL_DOMAINS: '${SANCTUM_STATEFUL_DOMAINS:-}'
      SESSION_DOMAIN: '${SESSION_DOMAIN:-}'

      # ── Admin seed (used by AdminUserSeeder on first migrate --seed) ───
      ADMIN_EMAIL: '${ADMIN_EMAIL:-admin@cholojai.bd}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:?set ADMIN_PASSWORD in .env or Coolify secrets}'

      # ── Demo data seeder (off in prod by default) ──
      SEED_DEMO_EVENTS: '${SEED_DEMO_EVENTS:-false}'

      # ── Public URLs Coolify will route to us ──
      PUBLIC_API_URL: '${PUBLIC_API_URL:-http://localhost:8000}'
      SERVICE_FQDN_BACKEND: '${SERVICE_FQDN_BACKEND:-localhost}'
      SERVICE_URL_BACKEND: '${SERVICE_URL_BACKEND:-http://localhost:8000}'

      # ── First-boot flag — set true ONCE to seed demo data, then false ──
      RUN_SEED: '${RUN_SEED:-false}'
    volumes:
      - uploads_data:/var/www/html/storage/app/public
      - laravel_logs:/var/www/html/storage/logs
      - laravel_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test:
        - CMD-SHELL
        - 'php -r "try { (new PDO(''mysql:host=db;dbname=$$MYSQL_DATABASE'', ''$$MYSQL_USER'', ''$$MYSQL_PASSWORD'')); exit(0); } catch (Throwable $$e) { exit(1); }"'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  web:
    image: nginx:alpine
    container_name: cholo-jai-web
    restart: unless-stopped
    ports:
      # Coolify usually routes public traffic via Traefik labels. We also
      # bind 8000 on the host so `curl http://localhost:8000/...` works
      # directly from the VPS shell.
      - '8000:80'
    volumes:
      - ./backend-laravel/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/html/storage/app/public:ro
    depends_on:
      - backend
      - db
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q --spider http://127.0.0.1/up || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cholo-jai-pma
    restart: unless-stopped
    # Optional utility service: disabled by default so production deploys
    # don't fail if a host port is already occupied.
    profiles:
      - tools
    ports:
      # Bind to localhost only. Make host port configurable to avoid
      # collisions on shared VPS hosts.
      - '127.0.0.1:${PHPMYADMIN_PORT:-18080}:80'
    environment:
      PMA_HOST: 'db'
      PMA_PORT: '3306'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD in .env or Coolify secrets}'
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    name: cholo-jai-mysql
  uploads_data:
    name: cholo-jai-uploads
  laravel_logs:
    name: cholo-jai-laravel-logs
  laravel_cache:
    name: cholo-jai-laravel-cache