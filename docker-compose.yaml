# Cholo Jai — root-level Compose for Coolify / VPS deployment.
#
# This file lives at the repository root and pulls in the Laravel app
# from the `backend-laravel/` subdirectory. Deploy from the repo root
# with `docker compose up -d` (or point Coolify's Docker Compose resource
# at the repo root).
#
# Services:
#   - db          MySQL 8.0 with utf8mb4 + Asia/Dhaka timezone
#   - php         Laravel 11 php-fpm app (internal)
#   - backend     nginx serving PHP-FPM (Coolify proxy)
#   - phpmyadmin  DB admin UI on 127.0.0.1:8080 (tunnel in via SSH)
#
# Fill in the secrets in `.env` next to this file (copy from
# backend-laravel/.env.coolify.example) before `docker compose up -d`.
# Coolify will also let you set these as Service → Environment
# Variables in its UI instead of mounting a .env file.

name: cholo-jai-backend

services:
  db:
    image: mysql:8.0
    container_name: cholo-jai-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+06:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-laravel/docker/mysql.cnf:/etc/mysql/conf.d/cholo.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-CholoJaiRoot!2026}'
      MYSQL_DATABASE: '${MYSQL_DATABASE:-cholo_jai}'
      MYSQL_USER: '${MYSQL_USER:-cholo}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-CholoJaiApp!2026}'
    healthcheck:
      test:
        - CMD-SHELL
        - 'mysqladmin ping --silent -u root -p"$${MYSQL_ROOT_PASSWORD}"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  php:
    build:
      context: ./backend-laravel
      dockerfile: docker/Dockerfile
    image: cholo-jai-php:latest
    container_name: cholo-jai-php
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Laravel core ──
      APP_NAME: 'CholoJai'
      APP_ENV: 'production'
      APP_KEY: 'base64:8vTtXj5xwG+z8uGgF2z2m5E0lQk9bM2cW1QnHh3s7xQ='
      APP_DEBUG: '${APP_DEBUG:-false}'
      APP_URL: '${SERVICE_URL_BACKEND:-http://localhost:8000}'
      LOG_CHANNEL: 'stderr'
      LOG_LEVEL: '${LOG_LEVEL:-info}'
      API_VERSION: '${API_VERSION:-0.1.0}'

      # ── Database (MySQL) ──
      DB_CONNECTION: 'mysql'
      DB_HOST: 'db'
      DB_PORT: '3306'
      DB_DATABASE: '${MYSQL_DATABASE:-cholo_jai}'
      DB_USERNAME: '${MYSQL_USER:-cholo}'
      DB_PASSWORD: '${MYSQL_PASSWORD:-CholoJaiApp!2026}'
      DB_CHARSET: 'utf8mb4'
      DB_COLLATION: 'utf8mb4_unicode_ci'

      # ── Cache / sessions / queue (file-backed; no Redis needed) ──
      CACHE_STORE: 'file'
      SESSION_DRIVER: 'file'
      SESSION_LIFETIME: '120'
      QUEUE_CONNECTION: 'sync'
      FILESYSTEM_DISK: 'public'

      # ── CORS / frontend origin ──
      FRONTEND_ORIGIN: '${FRONTEND_ORIGIN:-https://cholo-jai-frontend.uiucomputerclub.com}'
      FRONTEND_URL: '${FRONTEND_URL:-https://cholo-jai-frontend.uiucomputerclub.com}'
      SANCTUM_STATEFUL_DOMAINS: '${SANCTUM_STATEFUL_DOMAINS:-}'
      SESSION_DOMAIN: '${SESSION_DOMAIN:-}'

      # ── Admin seed (used by AdminUserSeeder on first migrate --seed) ───
      ADMIN_EMAIL: '${ADMIN_EMAIL:-naeemabdullahsadik@gmail.com}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in Coolify}'

      # ── Demo data seeder (off in prod by default) ──
      SEED_DEMO_EVENTS: '${SEED_DEMO_EVENTS:-false}'

      # ── Public URLs Coolify will route to us ──
      PUBLIC_API_URL: '${SERVICE_URL_BACKEND:-http://localhost:8000}'

    volumes:
      - uploads_data:/var/www/html/storage/app/public
    healthcheck:
      test:
        - CMD-SHELL
        - 'php -v >/dev/null 2>&1 && test -f /var/www/html/public/index.php'
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s

  backend:
    build:
      context: ./backend-laravel
      dockerfile: docker/nginx.Dockerfile
    image: cholo-jai-backend:latest
    container_name: cholo-jai-backend
    restart: unless-stopped
    # No host port bind: Coolify/Traefik should route to this service
    # internally. This avoids host-port collisions on shared VPS hosts.
    expose:
      - '80'
    environment:
      # Coolify must route HTTP traffic to nginx, not PHP-FPM.
      SERVICE_URL_BACKEND: '${SERVICE_URL_BACKEND:-http://localhost:8000}'
    volumes:
      - uploads_data:/var/www/html/storage/app/public:ro
    depends_on:
      php:
        condition: service_started
      db:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q --spider http://127.0.0.1/up || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cholo-jai-pma
    restart: unless-stopped
    # Optional utility service: disabled by default so production deploys
    # don't fail if a host port is already occupied.
    profiles:
      - tools
    ports:
      # Bind to localhost only. Make host port configurable to avoid
      # collisions on shared VPS hosts.
      - '127.0.0.1:${PHPMYADMIN_PORT:-18080}:80'
    environment:
      PMA_HOST: 'db'
      PMA_PORT: '3306'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-}'
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    name: cholo-jai-mysql-v5
  uploads_data:
    name: cholo-jai-uploads
