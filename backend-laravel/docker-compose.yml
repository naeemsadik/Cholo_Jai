# Cholo Jai — Laravel backend (LOCAL DEV variant).
#
# For VPS / Coolify deployment, use the canonical docker-compose.yml at
# the repo root (`../docker-compose.yml`) — that's what production uses.
# This file is kept for local development of the backend in isolation:
#   cd backend-laravel && docker compose up -d
#
# It brings up MySQL 8.0, the Laravel php-fpm app, and nginx serving it
# on port 8000. phpMyAdmin runs on 127.0.0.1:8080.
#
# Fill in the secrets in `.env` (see `.env.coolify.example`) before
# `docker compose up -d`.

name: cholo-jai-backend

services:
  db:
    image: mysql:8.0
    container_name: cholo-jai-db
    restart: unless-stopped
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+06:00
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql.cnf:/etc/mysql/conf.d/cholo.cnf:ro
    environment:
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-CholoJaiRoot!2026}'
      MYSQL_DATABASE: '${MYSQL_DATABASE:-cholo_jai}'
      MYSQL_USER: '${MYSQL_USER:-cholo}'
      MYSQL_PASSWORD: '${MYSQL_PASSWORD:-CholoJaiApp!2026}'
    healthcheck:
      test:
        - CMD-SHELL
        - 'mysqladmin ping --silent -u root -p"$${MYSQL_ROOT_PASSWORD}"'
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  php:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: cholo-jai-php:latest
    container_name: cholo-jai-php
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      # ── Laravel core ──
      APP_NAME: 'CholoJai'
      APP_ENV: '${APP_ENV:-production}'
      APP_KEY: '${APP_KEY:-}'
      APP_DEBUG: '${APP_DEBUG:-false}'
      APP_URL: '${APP_URL:-http://localhost:8000}'
      LOG_CHANNEL: 'stack'
      LOG_LEVEL: '${LOG_LEVEL:-info}'
      API_VERSION: '${API_VERSION:-0.1.0}'

      # ── Database (MySQL) ──
      DB_CONNECTION: 'mysql'
      DB_HOST: 'db'
      DB_PORT: '3306'
      DB_DATABASE: '${MYSQL_DATABASE:-cholo_jai}'
      DB_USERNAME: '${MYSQL_USER:-cholo}'
      DB_PASSWORD: '${MYSQL_PASSWORD:-CholoJaiApp!2026}'
      DB_CHARSET: 'utf8mb4'
      DB_COLLATION: 'utf8mb4_unicode_ci'

      # ── Cache / sessions / queue (file-backed; no Redis needed) ──
      CACHE_STORE: 'file'
      SESSION_DRIVER: 'file'
      SESSION_LIFETIME: '120'
      QUEUE_CONNECTION: 'sync'
      FILESYSTEM_DISK: 'public'

      # ── CORS / frontend origin ──
      FRONTEND_ORIGIN: '${FRONTEND_ORIGIN:-http://localhost:3000}'
      FRONTEND_URL: '${FRONTEND_URL:-http://localhost:3000}'
      SANCTUM_STATEFUL_DOMAINS: '${SANCTUM_STATEFUL_DOMAINS:-}'
      SESSION_DOMAIN: '${SESSION_DOMAIN:-}'

      # ── Admin seed (used by AdminUserSeeder on first migrate --seed) ───
      ADMIN_EMAIL: '${ADMIN_EMAIL:-admin@cholojai.bd}'
      ADMIN_PASSWORD: '${ADMIN_PASSWORD:-Admin@NaeemSadik2001}'

      # ── Demo data seeder (off in prod by default) ──
      SEED_DEMO_EVENTS: '${SEED_DEMO_EVENTS:-false}'

      # ── Public URLs Coolify will route to us ──
      PUBLIC_API_URL: '${PUBLIC_API_URL:-http://localhost:8000}'

    volumes:
      - uploads_data:/var/www/html/storage/app/public
      - laravel_logs:/var/www/html/storage/logs
      - laravel_cache:/var/www/html/bootstrap/cache
    healthcheck:
      test:
        - CMD-SHELL
        - 'php artisan migrate:status --no-interaction >/dev/null 2>&1'
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  backend:
    image: nginx:alpine
    container_name: cholo-jai-backend
    restart: unless-stopped
    ports:
      # Coolify usually routes public traffic via Traefik labels. We also
      # bind 8000 on the host so `curl http://localhost:8000/...` works
      # directly from the VPS shell.
      - '8000:80'
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - uploads_data:/var/www/html/storage/app/public:ro
    depends_on:
      - php
      - db
    healthcheck:
      test:
        - CMD-SHELL
        - 'wget -q --spider http://127.0.0.1/up || exit 1'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: cholo-jai-pma
    restart: unless-stopped
    ports:
      # Bind to localhost only — Coolify exposes via reverse proxy if
      # needed. Comment out the 127.0.0.1: prefix to expose publicly.
      - '127.0.0.1:8080:80'
    environment:
      PMA_HOST: 'db'
      PMA_PORT: '3306'
      MYSQL_ROOT_PASSWORD: '${MYSQL_ROOT_PASSWORD:-}'
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data:
    name: cholo-jai-mysql
  uploads_data:
    name: cholo-jai-uploads
  laravel_logs:
    name: cholo-jai-laravel-logs
  laravel_cache:
    name: cholo-jai-laravel-cache
